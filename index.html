<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loveucifer | Portfolio</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ccc;
            --text-main: #e0e0e0;
            --text-light: #888;
            --highlight-bg: #2a2a2a;
            --highlight-border: #3a3a3a;
        }

        @font-face {
            font-family: 'custom_mono';
            src: url('https://fonts.gstatic.com/s/robotomono/v22/L0x5DF4xlVMF-BfR8bXMIjhGq3-cXbKDO1w.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'custom_mono', 'SF Mono', 'Consolas', 'Menlo', monospace;
            font-size: 16px;
            line-height: 1.7;
            margin: 0;
            display: flex;
            padding: 3rem;
        }

        a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            transition: color 0.2s ease-in-out;
        }

        a:hover {
            color: var(--text-main);
        }
        
        .sidebar {
            width: 150px;
            flex-shrink: 0;
            padding-right: 2rem;
        }

        .sidebar-nav a {
            display: block;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }
        
        .sidebar-nav a:before {
            content: '>';
            margin-right: 0.75rem;
            color: var(--text-light);
        }

        .main-content {
            width: 100%;
            padding-right: 260px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        header .logo {
            font-weight: bold;
        }

        .intro .highlight {
            background-color: var(--highlight-bg);
            border: 1px solid var(--highlight-border);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            margin: 0 2px;
        }
        
        .intro p {
            max-width: 600px;
            margin-bottom: 2rem;
        }
        
        .quick-links a {
            margin-right: 1.5rem;
        }
        
        .content-section {
            margin-top: 4rem;
        }

        .content-section h2 {
            font-weight: normal;
            font-size: 1em;
            margin-bottom: 2rem;
        }
        
        .item-list {
            max-width: 750px;
        }

        .list-item {
            display: flex;
            margin-bottom: 1.5rem;
            align-items: flex-start;
        }
        
        .list-item .name {
            width: 150px;
            flex-shrink: 0;
            color: var(--text-main);
        }
        
        .list-item .desc {
            color: var(--text-light);
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-gallery img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid var(--highlight-border);
        }
        
        .side-widget {
            position: fixed;
            top: 3rem;
            right: 3rem;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .side-widget .tenor-gif-embed {
            border: 1px solid var(--highlight-border);
        }

        .profile-grid {
            display: flex;
            gap: 4px;
        }

        .profile-grid a {
            display: block;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--highlight-border);
            background: var(--highlight-bg);
            flex-shrink: 0;
        }

        .profile-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1024px) {
            .side-widget {
                position: relative;
                top: auto;
                right: auto;
                width: 100%;
                margin-top: 4rem;
                flex-direction: row;
                justify-content: center;
            }
            .side-widget .tenor-gif-embed {
                max-width: 45%;
            }
            .main-content {
                padding-right: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding: 1.5rem;
            }
            .sidebar {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                margin-bottom: 2rem;
            }
            .sidebar-nav a {
                margin-right: 1.5rem;
                margin-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="philosophy.html">philosophy</a>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <a href="index.html" class="logo" style="text-decoration: none;">loveucifer</a>
        </header>

        <section class="intro">
            <p>loves working on <span class="highlight">flutter</span>, <span class="highlight">python</span>, <span class="highlight">linux</span>, and <span class="highlight">rust</span>.</p>
            <p>building kimino.</p>
        </section>
        
        <section class="quick-links">
            <a href="https://github.com/loveucifer" target="_blank">github</a>
            <a href="https://loveucifer.bearblog.dev" target="_blank">blogs</a>

        </section>
        
        <section id="environment" class="content-section">
            <h2>my environment &rarr;</h2>
            <div class="image-gallery">
                <img src="https://github.com/loveucifer/dev/blob/main/codeeditor.png?raw=true" alt="Code editor screenshot">
                <img src="https://github.com/loveucifer/dev/blob/main/desktop.png?raw=true" alt="Desktop screenshot">
            </div>
        </section>
    </main>
    
    <aside class="side-widget">
        <div class="tenor-gif-embed" data-postid="7476516897214488946" data-share-method="host" data-aspect-ratio="1.77857" data-width="100%"><a href="https://tenor.com/view/pinkupinemame-kakegurui-anime-gif-7476516897214488946">Pinkupinemame Kakegurui GIF</a>from <a href="https://tenor.com/search/pinkupinemame-gifs">Pinkupinemame GIFs</a></div>
        <div class="tenor-gif-embed" data-postid="5850692150497406639" data-share-method="host" data-aspect-ratio="1.76596" data-width="100%"><a href="https://tenor.com/view/cyberpunk-2077-2077brizzard-br-b-gif-5850692150497406639">Cyberpunk 2077 GIF</a>from <a href="https://tenor.com/search/cyberpunk-gifs">Cyberpunk GIFs</a></div>
            <div class="profile-section">
                <div style="font-size: 0.85em; margin-bottom: 0.75rem; color: var(--text-light);">checkout my cool friends</div>
                <div class="profile-grid" id="profile-grid" data-profiles="torvalds,shadcn"></div>
            </div>
    </aside>

    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    <script>
        async function fetchGitHubProfile(username) {
            const response = await fetch(`https://api.github.com/users/${username}`);
            if (!response.ok) return null;
            return response.json();
        }

        async function loadProfiles() {
            const grid = document.getElementById('profile-grid');
            try {
                const res = await fetch('friends.txt');
                const text = await res.text();
                const profiles = text.trim().split('\n').filter(p => p.trim());
                for (const username of profiles) {
                    try {
                        const user = await fetchGitHubProfile(username.trim());
                        if (user) {
                            const link = document.createElement('a');
                            link.href = user.html_url;
                            link.target = '_blank';
                            link.title = user.login;
                            const img = document.createElement('img');
                            img.src = user.avatar_url;
                            img.alt = user.login;
                            link.appendChild(img);
                            grid.appendChild(link);
                        }
                    } catch (e) {}
                }
            } catch (e) {
                // Fallback to data attribute
                const profiles = grid.dataset.profiles.split(',').filter(p => p.trim());
                for (const username of profiles) {
                    try {
                        const user = await fetchGitHubProfile(username.trim());
                        if (user) {
                            const link = document.createElement('a');
                            link.href = user.html_url;
                            link.target = '_blank';
                            link.title = user.login;
                            const img = document.createElement('img');
                            img.src = user.avatar_url;
                            img.alt = user.login;
                            link.appendChild(img);
                            grid.appendChild(link);
                        }
                    } catch (e) {}
                }
            }
        }

        loadProfiles();
    </script>
</body>
</html>
