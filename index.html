<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loveucifer | Portfolio</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ccc;
            --text-main: #e0e0e0;
            --text-light: #888;
            --highlight-bg: #2a2a2a;
            --highlight-border: #3a3a3a;
        }

        @font-face {
            font-family: 'custom_mono';
            src: url('https://fonts.gstatic.com/s/robotomono/v22/L0x5DF4xlVMF-BfR8bXMIjhGq3-cXbKDO1w.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'custom_mono', 'SF Mono', 'Consolas', 'Menlo', monospace;
            font-size: 16px;
            line-height: 1.7;
            margin: 0;
            display: flex;
            padding: 3rem;
        }

        a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            transition: color 0.2s ease-in-out;
        }

        a:hover {
            color: var(--text-main);
        }
        
        .sidebar {
            width: 150px;
            flex-shrink: 0;
            padding-right: 2rem;
        }

        .sidebar-nav a {
            display: block;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }
        
        .sidebar-nav a:before {
            content: '>';
            margin-right: 0.75rem;
            color: var(--text-light);
        }

        .main-content {
            width: 100%;
            padding-right: 260px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        header .logo {
            font-weight: bold;
        }

        .intro .highlight {
            background-color: var(--highlight-bg);
            border: 1px solid var(--highlight-border);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            margin: 0 2px;
        }
        
        .intro p {
            max-width: 600px;
            margin-bottom: 2rem;
        }
        
        .quick-links a {
            margin-right: 1.5rem;
        }
        
        .content-section {
            margin-top: 4rem;
        }

        .content-section h2 {
            font-weight: normal;
            font-size: 1em;
            margin-bottom: 2rem;
        }
        
        .item-list {
            max-width: 750px;
        }

        .list-item {
            display: flex;
            margin-bottom: 1.5rem;
            align-items: flex-start;
        }
        
        .list-item .name {
            width: 150px;
            flex-shrink: 0;
            color: var(--text-main);
        }
        
        .list-item .desc {
            color: var(--text-light);
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-gallery img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid var(--highlight-border);
        }
        
        .side-widget {
            position: fixed;
            top: 3rem;
            right: 3rem;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .side-widget .tenor-gif-embed {
            border: 1px solid var(--highlight-border);
        }

        .profile-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            max-width: 170px;
        }

        .profile-grid a {
            display: block;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--highlight-border);
            background: var(--highlight-bg);
            flex-shrink: 0;
        }

        .profile-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1024px) {
            .side-widget {
                position: relative;
                top: auto;
                right: auto;
                width: 100%;
                margin-top: 4rem;
                flex-direction: row;
                justify-content: center;
            }
            .side-widget .tenor-gif-embed {
                max-width: 45%;
            }
            .main-content {
                padding-right: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding: 1.5rem;
            }
            .sidebar {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                margin-bottom: 2rem;
            }
            .sidebar-nav a {
                margin-right: 1.5rem;
                margin-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="philosophy.html">philosophy</a>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <a href="index.html" class="logo" style="text-decoration: none;">loveucifer</a>
        </header>

        <section class="intro">
            <p>loves working on <span class="highlight">flutter</span>, <span class="highlight">swift</span>, <span class="highlight">games</span>, and <span class="highlight">rust</span>.</p>
            <p> right now in depression and i occasionally write code for swift tooling .</p>
        </section>
        
        <section class="quick-links">
            <a href="https://github.com/loveucifer" target="_blank">github</a>
            <a href="https://loveucifer.bearblog.dev" target="_blank">blogs</a>

        </section>
        
        <section id="environment" class="content-section">
            <h2>my environment &rarr;</h2>
            <div class="image-gallery">
                <img src="https://github.com/loveucifer/dev/blob/main/codeeditor.png?raw=true" alt="Code editor screenshot">
                <img src="https://github.com/loveucifer/dev/blob/main/desktop.png?raw=true" alt="Desktop screenshot">
            </div>
        </section>
    </main>
    
    <aside class="side-widget">
        <div class="tenor-gif-embed" data-postid="7476516897214488946" data-share-method="host" data-aspect-ratio="1.77857" data-width="100%"><a href="https://tenor.com/view/pinkupinemame-kakegurui-anime-gif-7476516897214488946">Pinkupinemame Kakegurui GIF</a>from <a href="https://tenor.com/search/pinkupinemame-gifs">Pinkupinemame GIFs</a></div>
        <div class="tenor-gif-embed" data-postid="5850692150497406639" data-share-method="host" data-aspect-ratio="1.76596" data-width="100%"><a href="https://tenor.com/view/cyberpunk-2077-2077brizzard-br-b-gif-5850692150497406639">Cyberpunk 2077 GIF</a>from <a href="https://tenor.com/search/cyberpunk-gifs">Cyberpunk GIFs</a></div>
            <div class="profile-section">
                <div style="font-size: 0.85em; margin-bottom: 0.75rem; color: var(--text-light);">checkout my cool friends</div>
                <div class="profile-grid" id="profile-grid" data-profiles="torvalds,shadcn"></div>
            </div>
    </aside>

    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    <script>
        async function fetchGitHubProfile(username) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 second timeout
                
                const response = await fetch(`https://api.github.com/users/${username}`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) return null;
                return await response.json();
            } catch (error) {
                console.warn(`Failed to fetch profile for ${username}:`, error.message);
                return null;
            }
        }

        function createProfileElement(user) {
            const link = document.createElement('a');
            link.href = user.html_url;
            link.target = '_blank';
            link.title = user.login;
            link.style.opacity = '0';
            link.style.transition = 'opacity 0.3s ease';
            
            const img = document.createElement('img');
            img.src = user.avatar_url;
            img.alt = user.login;
            img.onload = () => link.style.opacity = '1';
            
            link.appendChild(img);
            return link;
        }

        async function loadProfiles() {
            const grid = document.getElementById('profile-grid');
            
            // Show loading indicator
            grid.innerHTML = '<div style="color: var(--text-light); font-size: 0.8em;">loading friends...</div>';
            
            let profiles = [];
            
            try {
                const res = await fetch('friends.txt');
                if (res.ok) {
                    const text = await res.text();
                    profiles = text.trim().split('\n').filter(p => p.trim());
                }
            } catch (e) {
                console.warn('Failed to fetch friends.txt, using fallback');
            }
            
            // Fallback to data attribute if friends.txt failed
            if (profiles.length === 0) {
                profiles = grid.dataset.profiles.split(',').filter(p => p.trim());
            }
            
            if (profiles.length === 0) {
                grid.innerHTML = '<div style="color: var(--text-light); font-size: 0.8em;">no friends found</div>';
                return;
            }
            
            // Clear loading message
            grid.innerHTML = '';
            
            // Load all profiles in parallel for speed
            const profilePromises = profiles.map(username => 
                fetchGitHubProfile(username.trim())
            );
            
            // Process results as they come in
            profilePromises.forEach(async (promise, index) => {
                try {
                    const user = await promise;
                    if (user) {
                        const profileElement = createProfileElement(user);
                        grid.appendChild(profileElement);
                    }
                } catch (e) {
                    console.warn(`Failed to process profile ${profiles[index]}`);
                }
            });
            
            // Set a fallback timeout
            setTimeout(() => {
                if (grid.children.length === 0) {
                    grid.innerHTML = '<div style="color: var(--text-light); font-size: 0.8em;">friends temporarily unavailable</div>';
                }
            }, 10000);
        }

        loadProfiles();
    </script>
</body>
</html>
